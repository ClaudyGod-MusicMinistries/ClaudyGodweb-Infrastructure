################################################################################
#                     CLAUDYGOD PRODUCTION DOCKER COMPOSE                      #
#                    (Shared Proxy + Supabase + Brevo)                         #
#                                                                              #
# Production setup using:                                                      #
# - Supabase PostgreSQL (managed database)                                     #
# - Brevo SMTP (email relay service)                                          #
# - Local Redis (cache, sessions, pub/sub)                                    #
# - Traefik v3.6 (shared proxy at ~/apps/proxy)                              #
# - Grafana (optional monitoring)                                             #
#                                                                              #
# This is a MANAGED SERVICES setup with NO local database.                   #
# All data is stored in Supabase (PostgreSQL).                               #
# All email goes through Brevo SMTP relay.                                   #
#                                                                              #
# Deploy Instructions:                                                         #
#   $ cp .env.example .env && nano .env     # Fill in Supabase + Brevo creds #
#   $ docker compose up -d                  # Uses shared traefik             #
#                                                                              #
################################################################################

version: '3.9'

name: claudygod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  ################################################################################
  #                         REDIS: Cache & Session Store                       #
  ################################################################################

  redis:
    image: redis:7-alpine
    container_name: claudygod_redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    networks:
      - claudygod-internal

    expose:
      - "6379"

    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}
      --appendonly yes
      --appendfsync everysec
      --bind 0.0.0.0

    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    tmpfs:
      - /tmp

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging


  ################################################################################
  #              MIGRATIONS: EF Core (Supabase Database Setup)                 #
  ################################################################################

  migrate:
    image: ${BACKEND_IMAGE}
    container_name: claudygod_migrate
    restart: "no"

    networks:
      - claudygod-internal

    environment:
      TZ: ${TZ:-UTC}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # Supabase PostgreSQL connection string (managed database)
      # Format: postgresql://user:password@host:port/database
      ConnectionStrings__DefaultConnection: ${SUPABASE_CONNECTION_STRING}

    entrypoint: [
      "dotnet",
      "ClaudyGod.API.dll",
      "--migrate"
    ]

    depends_on:
      redis:
        condition: service_healthy

    # Retry on failure (database might be initializing)
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging


  ################################################################################
  #                    .NET 8 BACKEND API (WebSocket + SSE)                    #
  ################################################################################

  api:
    image: ${BACKEND_IMAGE}
    container_name: claudygod_api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true

    networks:
      - traefik-public
      - claudygod-internal

    expose:
      - "8080"

    volumes:
      - api_uploads:/app/uploads:rw
      - api_logs:/app/logs:rw
      - /tmp:/app/tmp:rw

    tmpfs:
      - /run
      - /tmp

    environment:
      TZ: ${TZ:-UTC}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # ┌──────────────────────────────────────────────┐
      # │    SUPABASE POSTGRESQL CONNECTION            │
      # └──────────────────────────────────────────────┘
      # Connection string format:
      # postgresql://user:password@host:port/database
      # Uses connection pooler (5432) for IPv4
      ConnectionStrings__DefaultConnection: ${SUPABASE_CONNECTION_STRING}

      # ┌──────────────────────────────────────────────┐
      # │    REDIS CONNECTION (Cache + Sessions)       │
      # └──────────────────────────────────────────────┘
      ConnectionStrings__RedisConnection: redis://:${REDIS_PASSWORD}@redis:6379

      # ┌──────────────────────────────────────────────┐
      # │    JWT CONFIGURATION                         │
      # └──────────────────────────────────────────────┘
      JwtSettings__SecretKey: ${JWT_KEY}
      JwtSettings__Issuer: https://${API_DOMAIN}
      JwtSettings__Audience: https://${DOMAIN}
      JwtSettings__ExpirationMinutes: "60"
      JwtSettings__RefreshTokenExpirationDays: "7"

      # ┌──────────────────────────────────────────────┐
      # │    ENCRYPTION SETTINGS                       │
      # └──────────────────────────────────────────────┘
      EncryptionSettings__Key: ${ENCRYPTION_KEY}

      # ┌──────────────────────────────────────────────┐
      # │    BREVO EMAIL CONFIGURATION                 │
      # └──────────────────────────────────────────────┘
      # Brevo SMTP Relay: smtp-relay.brevo.com:587
      EmailSettings__SmtpHost: ${EMAIL_SMTP_HOST}
      EmailSettings__SmtpPort: ${EMAIL_SMTP_PORT}
      EmailSettings__SmtpUsername: ${EMAIL_SMTP_USERNAME}
      EmailSettings__SmtpPassword: ${EMAIL_SMTP_PASSWORD}
      EmailSettings__FromAddress: ${EMAIL_FROM_ADDRESS}
      EmailSettings__FromName: ${EMAIL_FROM_NAME}
      EmailSettings__AdminEmail: ${EMAIL_ADMIN}
      EmailSettings__UseTls: "true"

      # ┌──────────────────────────────────────────────┐
      # │    PAYMENT GATEWAY (PAYSTACK)                │
      # └──────────────────────────────────────────────┘
      PaystackSettings__SecretKey: ${PAYSTACK_SECRET_KEY}
      PaystackSettings__PublicKey: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY}

      # ┌──────────────────────────────────────────────┐
      # │    AI SERVICES (ANTHROPIC CLAUDE)            │
      # └──────────────────────────────────────────────┘
      AnthropicSettings__ApiKey: ${ANTHROPIC_API_KEY}
      AnthropicSettings__Model: ${CLAUDE_MODEL}

      # ┌──────────────────────────────────────────────┐
      # │    CORS CONFIGURATION                        │
      # └──────────────────────────────────────────────┘
      CorsOrigins: "https://${DOMAIN},https://www.${DOMAIN},https://${API_DOMAIN},http://localhost:3000"

      # ┌──────────────────────────────────────────────┐
      # │    LOGGING CONFIGURATION                     │
      # └──────────────────────────────────────────────┘
      Serilog__MinimumLevel: "Information"
      Serilog__WriteTo__0__Name: "Console"
      Serilog__WriteTo__1__Name: "File"
      Serilog__WriteTo__1__Args__path: "/app/logs/api-.txt"
      Serilog__WriteTo__1__Args__rollingInterval: "Day"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

    logging: *default-logging

    labels:
      # Traefik routing (picked up by shared proxy via socket-proxy)
      traefik.enable: "true"
      traefik.docker.network: traefik-public

      # HTTP→HTTPS redirect
      traefik.http.routers.claudygod-api-http.rule: "Host(`${API_DOMAIN}`) && PathPrefix(`/api`)"
      traefik.http.routers.claudygod-api-http.entrypoints: "web"
      traefik.http.routers.claudygod-api-http.middlewares: "redirect-to-https@file"

      # HTTPS secure router (supports REST API + WebSocket)
      traefik.http.routers.claudygod-api-secure.rule: "Host(`${API_DOMAIN}`)"
      traefik.http.routers.claudygod-api-secure.entrypoints: "websecure"
      traefik.http.routers.claudygod-api-secure.tls: "true"
      traefik.http.routers.claudygod-api-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.claudygod-api-secure.middlewares: "security-chain@file"
      traefik.http.routers.claudygod-api-secure.service: "claudygod-api"

      # Service configuration
      traefik.http.services.claudygod-api.loadbalancer.server.port: "8080"
      traefik.http.services.claudygod-api.loadbalancer.healthcheck.path: "/healthz"
      traefik.http.services.claudygod-api.loadbalancer.healthcheck.interval: "30s"
      traefik.http.services.claudygod-api.loadbalancer.serversTransportMaxConnsPerHost: "100"


  ################################################################################
  #                   NEXT.JS FRONTEND (Server Components + Real-Time)         #
  ################################################################################

  web:
    image: ${FRONTEND_IMAGE}
    container_name: claudygod_web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    networks:
      - traefik-public
      - claudygod-internal

    expose:
      - "3000"

    tmpfs:
      - /tmp
      - /run

    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      NEXT_TELEMETRY_DISABLED: 1

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      api:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    logging: *default-logging

    labels:
      # Traefik routing
      traefik.enable: "true"
      traefik.docker.network: traefik-public

      # HTTP→HTTPS redirect
      traefik.http.routers.claudygod-web-http.rule: "Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      traefik.http.routers.claudygod-web-http.entrypoints: "web"
      traefik.http.routers.claudygod-web-http.middlewares: "redirect-to-https@file"

      # HTTPS secure router
      traefik.http.routers.claudygod-web-secure.rule: "Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      traefik.http.routers.claudygod-web-secure.entrypoints: "websecure"
      traefik.http.routers.claudygod-web-secure.tls: "true"
      traefik.http.routers.claudygod-web-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.claudygod-web-secure.middlewares: "security-chain@file"
      traefik.http.routers.claudygod-web-secure.service: "claudygod-web"

      # WWW redirect (www.claudygod.org → claudygod.org)
      traefik.http.middlewares.www-redirect.redirectregex.regex: "^https://www\\.(.*)"
      traefik.http.middlewares.www-redirect.redirectregex.replacement: "https://$${1}"
      traefik.http.middlewares.www-redirect.redirectregex.permanent: "true"

      # Service configuration
      traefik.http.services.claudygod-web.loadbalancer.server.port: "3000"
      traefik.http.services.claudygod-web.loadbalancer.healthcheck.path: "/"
      traefik.http.services.claudygod-web.loadbalancer.healthcheck.interval: "30s"


  ################################################################################
  #                    GRAFANA: MONITORING & DASHBOARDS                        #
  ################################################################################

  grafana:
    image: grafana/grafana:latest
    container_name: claudygod_grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    networks:
      - traefik-public
      - claudygod-internal

    expose:
      - "3000"

    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_provisioning:/etc/grafana/provisioning:ro
      - /tmp:/tmp

    tmpfs:
      - /run
      - /var/cache

    environment:
      TZ: ${TZ:-UTC}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging

    labels:
      # Traefik routing for Grafana dashboard
      traefik.enable: "true"
      traefik.docker.network: traefik-public

      # HTTP→HTTPS redirect
      traefik.http.routers.claudygod-grafana-http.rule: "Host(`${GRAFANA_DOMAIN}`)"
      traefik.http.routers.claudygod-grafana-http.entrypoints: "web"
      traefik.http.routers.claudygod-grafana-http.middlewares: "redirect-to-https@file"

      # HTTPS secure router
      traefik.http.routers.claudygod-grafana-secure.rule: "Host(`${GRAFANA_DOMAIN}`)"
      traefik.http.routers.claudygod-grafana-secure.entrypoints: "websecure"
      traefik.http.routers.claudygod-grafana-secure.tls: "true"
      traefik.http.routers.claudygod-grafana-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.claudygod-grafana-secure.middlewares: "security-chain@file"
      traefik.http.routers.claudygod-grafana-secure.service: "claudygod-grafana"

      # Service configuration
      traefik.http.services.claudygod-grafana.loadbalancer.server.port: "3000"
      traefik.http.services.claudygod-grafana.loadbalancer.healthcheck.path: "/api/health"
      traefik.http.services.claudygod-grafana.loadbalancer.healthcheck.interval: "30s"


################################################################################
#                      NETWORKS (Shared Proxy Architecture)                   #
################################################################################

networks:
  # External network (managed by shared proxy at ~/apps/proxy)
  traefik-public:
    external: true
    name: traefik-public

  # Internal network for Redis and internal communication (no internet)
  claudygod-internal:
    driver: bridge
    internal: true


################################################################################
#                              VOLUMES                                         #
################################################################################

volumes:
  # Redis persistent data (RDB + AOF)
  redis_data:
    name: claudygod_redis_data
    driver: local

  # API file uploads (user-generated content)
  api_uploads:
    name: claudygod_api_uploads
    driver: local

  # API logs (application logs for debugging)
  api_logs:
    name: claudygod_api_logs
    driver: local

  # Grafana data (dashboards, configuration)
  grafana_data:
    name: claudygod_grafana_data
    driver: local

  # Grafana provisioning (data sources, dashboards)
  grafana_provisioning:
    name: claudygod_grafana_provisioning
    driver: local
