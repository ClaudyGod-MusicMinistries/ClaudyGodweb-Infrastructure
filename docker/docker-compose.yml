################################################################################
#                     CLAUDYGOD PRODUCTION DOCKER COMPOSE                      #
#                    (Shared Proxy + Supabase + Brevo)                         #
################################################################################

name: claudygod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  ##############################################################################
  #                       REDIS — Cache & Session Store                        #
  ##############################################################################
  redis:
    image: redis:7-alpine
    container_name: claudygod_redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    networks:
      - claudygod-internal
    expose:
      - "6379"

    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp
      - /run

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_MAX_MEMORY_POLICY: ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}

    command:
      - sh
      - -lc
      - |
        exec redis-server \
          --requirepass "$${REDIS_PASSWORD}" \
          --maxmemory 512mb \
          --maxmemory-policy "$${REDIS_MAX_MEMORY_POLICY}" \
          --bind 0.0.0.0


    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging


  ##############################################################################
  #              MIGRATE — One-shot EF Core migration job                      #
  ##############################################################################
  migrate:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: claudygod_migrate
    restart: "no"
    pull_policy: always

    # Use host network so the container inherits the host's DNS and routing.
    # This bypasses Docker's embedded DNS (which cannot forward to upstream
    # resolvers in this environment) and lets the container reach Supabase
    # directly, exactly as the host can.
    network_mode: "host"

    environment:
      TZ: ${TZ:-UTC}
      ASPNETCORE_ENVIRONMENT: Production
      # Use Supabase connection string for migrations
      ConnectionStrings__DefaultConnection: ${SUPABASE_CONNECTION_STRING:?SUPABASE_CONNECTION_STRING is required}

    entrypoint: ["dotnet", "ClaudyGod.API.dll", "--migrate"]

    # migrate only needs Supabase (external) — no local service dependency needed
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging


  ##############################################################################
  #                       .NET 8 BACKEND API                                   #
  ##############################################################################
  api:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: claudygod_api
    restart: unless-stopped
    pull_policy: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    networks:
      - traefik-public
      - claudygod-internal
    expose:
      - "8080"

    volumes:
      - api_uploads:/app/uploads:rw
      - api_logs:/app/logs:rw
    tmpfs:
      - /tmp
      - /run
      - /app/tmp

    environment:
      TZ: ${TZ:-UTC}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # Database (Supabase managed Postgres)
      ConnectionStrings__DefaultConnection: ${SUPABASE_CONNECTION_STRING:?SUPABASE_CONNECTION_STRING is required}

      # Redis — StackExchange.Redis connection string format (not URL format)
      # Program.cs reads Redis:ConnectionString → env var Jwt__Key (double-underscore = colon)
      Redis__ConnectionString: redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      Redis__InstanceName: "claudygod:"

      # JWT — must match what Program.cs and JwtService read: Jwt:Key / Jwt:Issuer / Jwt:Audience
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: https://${API_DOMAIN}
      Jwt__Audience: https://${DOMAIN}
      Jwt__AccessTokenExpiryMinutes: "60"
      Jwt__RefreshTokenExpiryDays: "7"

      # Encryption — matches EncryptionService config key
      Encryption__Key: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}

      # Email (Brevo SMTP) — keys match EmailService.cs: Email:SmtpHost, Email:SenderEmail, etc.
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-smtp-relay.brevo.com}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUsername: ${EMAIL_SMTP_USERNAME}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD}
      Email__SenderEmail: ${EMAIL_FROM_ADDRESS}
      Email__SenderName: ${EMAIL_FROM_NAME:-ClaudyGod Music Ministries}
      Email__UsePostfix: "false"

      # Paystack (optional — set when payment gateway is ready)
      PaystackSettings__SecretKey: ${PAYSTACK_SECRET_KEY:-}
      PaystackSettings__PublicKey: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY:-}

      # Anthropic Claude (optional — set when payment validation is enabled)
      AnthropicSettings__ApiKey: ${ANTHROPIC_API_KEY:-}
      AnthropicSettings__Model: ${CLAUDE_MODEL:-claude-sonnet-4-6}

      # CORS
      CorsOrigins: "https://${DOMAIN},https://www.${DOMAIN},https://${API_DOMAIN}"

      # Serilog
      Serilog__MinimumLevel: "Information"
      Serilog__WriteTo__0__Name: "Console"
      Serilog__WriteTo__1__Name: "File"
      Serilog__WriteTo__1__Args__path: "/app/logs/api-.txt"
      Serilog__WriteTo__1__Args__rollingInterval: "Day"


    depends_on:
      # Migrations now run in CI (GitHub Actions runner has direct Supabase access).
      # The migrate service still exists in this file for manual/emergency use only.
      redis:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

    logging: *default-logging

    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-public

      # HTTP entry — the shared proxy redirects to HTTPS at the entrypoint,
      # but a router on `web` is still required so Traefik knows the host
      # belongs to this service.
      traefik.http.routers.claudygod-api-http.rule: "Host(`${API_DOMAIN}`)"
      traefik.http.routers.claudygod-api-http.entrypoints: "web"

      # HTTPS router
      traefik.http.routers.claudygod-api-secure.rule: "Host(`${API_DOMAIN}`)"
      traefik.http.routers.claudygod-api-secure.entrypoints: "websecure"
      traefik.http.routers.claudygod-api-secure.tls: "true"
      traefik.http.routers.claudygod-api-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.claudygod-api-secure.service: "claudygod-api"

      # Service
      traefik.http.services.claudygod-api.loadbalancer.server.port: "8080"
      traefik.http.services.claudygod-api.loadbalancer.passhostheader: "true"


  ##############################################################################
  #                       NEXT.JS FRONTEND                                     #
  ##############################################################################
  web:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: claudygod_web
    restart: unless-stopped
    pull_policy: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    networks:
      - traefik-public
      - claudygod-internal
    expose:
      - "3000"

    tmpfs:
      - /tmp
      - /run
      - /app/.next/cache:rw,mode=1777

    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"

      # Server-side only — used by Next.js API routes to reach the .NET API
      # directly on the Docker-internal network (bypasses Traefik/internet).
      # backendProxy.ts: const API_BASE = process.env.API_BASE_URL ?? 'http://localhost:8080'
      API_BASE_URL: http://api:8080

      # Server-side Paystack secret — used by /api/payments/* route handlers
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}

      # NEXT_PUBLIC_* vars are baked into the image at build time (build-args).
      # They cannot be changed at runtime — these entries document expected values.
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY:-}


    depends_on:
      api:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    logging: *default-logging

    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-public

      # HTTP entry (entrypoint-level redirect handles HTTPS)
      traefik.http.routers.claudygod-web-http.rule: "Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      traefik.http.routers.claudygod-web-http.entrypoints: "web"

      # HTTPS router
      traefik.http.routers.claudygod-web-secure.rule: "Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      traefik.http.routers.claudygod-web-secure.entrypoints: "websecure"
      traefik.http.routers.claudygod-web-secure.tls: "true"
      traefik.http.routers.claudygod-web-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.claudygod-web-secure.service: "claudygod-web"
      traefik.http.routers.claudygod-web-secure.middlewares: "claudygod-www-redirect"

      # www → apex redirect
      traefik.http.middlewares.claudygod-www-redirect.redirectregex.regex: "^https?://www\\.(.*)"
      traefik.http.middlewares.claudygod-www-redirect.redirectregex.replacement: "https://$${1}"
      traefik.http.middlewares.claudygod-www-redirect.redirectregex.permanent: "true"

      # Service
      traefik.http.services.claudygod-web.loadbalancer.server.port: "3000"
      traefik.http.services.claudygod-web.loadbalancer.passhostheader: "true"
      traefik.http.services.claudygod-web.loadbalancer.healthcheck.path: "/"
      traefik.http.services.claudygod-web.loadbalancer.healthcheck.interval: "30s"


  ##############################################################################
  #                       GRAFANA — Optional monitoring                        #
  ##############################################################################
  grafana:
    image: grafana/grafana:11.3.0
    container_name: claudygod_grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    networks:
      - traefik-public
      - claudygod-internal
    expose:
      - "3000"

    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_provisioning:/etc/grafana/provisioning

    environment:
      TZ: ${TZ:-UTC}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"


    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging

    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-public

      traefik.http.routers.claudygod-grafana-http.rule: "Host(`${GRAFANA_DOMAIN}`)"
      traefik.http.routers.claudygod-grafana-http.entrypoints: "web"

      traefik.http.routers.claudygod-grafana-secure.rule: "Host(`${GRAFANA_DOMAIN}`)"
      traefik.http.routers.claudygod-grafana-secure.entrypoints: "websecure"
      traefik.http.routers.claudygod-grafana-secure.tls: "true"
      traefik.http.routers.claudygod-grafana-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.claudygod-grafana-secure.service: "claudygod-grafana"

      traefik.http.services.claudygod-grafana.loadbalancer.server.port: "3000"
      traefik.http.services.claudygod-grafana.loadbalancer.healthcheck.path: "/api/health"
      traefik.http.services.claudygod-grafana.loadbalancer.healthcheck.interval: "30s"


################################################################################
#                                NETWORKS                                      #
################################################################################
networks:
  traefik-public:
    external: true
    name: traefik-public
  claudygod-internal:
    driver: bridge
    internal: true


################################################################################
#                                 VOLUMES                                      #
################################################################################
volumes:
  redis_data:
    name: claudygod_redis_data
  api_uploads:
    name: claudygod_api_uploads
  api_logs:
    name: claudygod_api_logs
  grafana_data:
    name: claudygod_grafana_data
  grafana_provisioning:
    name: claudygod_grafana_provisioning