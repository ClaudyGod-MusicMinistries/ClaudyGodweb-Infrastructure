server {
    listen 80 default_server;
    server_name _;

    # Internal probe for Docker's healthcheck — must stay 200 so the
    # container health reflects "nginx is serving", not the intentional
    # public 503 below.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;

        # 5 minutes is a reasonable retry hint for clients/bots; adjust if
        # a maintenance window is expected to run longer.
        add_header Retry-After 300 always;

        error_page 503 /index.html;
        return 503;
    }
}
