name: Deploy to Production

on:
  push:
    branches: [main]
  # Allow other repos to trigger a deploy via repository_dispatch
  repository_dispatch:
    types: [deploy-api, deploy-web, deploy-all]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: false
        default: 'all'
        type: choice
        options: [all, api, web]
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  ORG: claudygod-musicministries

jobs:
  deploy:
    name: Deploy → Production VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Determine which service to deploy based on trigger
      - name: Resolve deploy target
        id: target
        run: |
          SERVICE="${{ github.event.inputs.service || github.event.client_payload.service || 'all' }}"
          TAG="${{ github.event.inputs.tag || github.event.client_payload.tag || 'latest' }}"
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG"        >> $GITHUB_OUTPUT
          echo "Deploy: service=$SERVICE  tag=$TAG"

      # Authenticate to GHCR so the server can pull private packages
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SERVICE: ${{ steps.target.outputs.service }}
          TAG: ${{ steps.target.outputs.tag }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 180s
          envs: GHCR_TOKEN,GITHUB_ACTOR,SERVICE,TAG,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "→ Authenticating with GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            export TAG="$TAG"

            echo "→ Deploying service: $SERVICE (tag: $TAG)"

            case "$SERVICE" in
              api)
                docker compose pull api migrate
                docker compose up --no-deps --remove-orphans -d migrate
                docker compose wait migrate || { echo "✗ Migration failed"; exit 1; }
                docker compose up --no-deps --remove-orphans -d api
                ;;
              web)
                docker compose pull web
                docker compose up --no-deps --remove-orphans -d web
                ;;
              *)
                docker compose pull api migrate web
                docker compose up --no-deps --remove-orphans -d migrate
                docker compose wait migrate || { echo "✗ Migration failed"; exit 1; }
                docker compose up --no-deps --remove-orphans -d api web
                ;;
            esac

            # Prune images older than 24h to free disk
            docker image prune -f --filter "until=24h" >/dev/null

            echo "✓ Deploy complete — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            docker compose ps
