name: Deploy to Production

on:
  push:
    branches: [main]
  # Allow other repos to trigger a deploy via repository_dispatch
  repository_dispatch:
    types: [deploy-api, deploy-web, deploy-all]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (api | web | all)'
        required: false
        default: 'api'
        type: choice
        options: [api, web, all]
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  ORG: claudygod-musicministries

jobs:
  deploy:
    name: Deploy → Production VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # Determine which service to deploy based on trigger
      - name: Resolve deploy target
        id: target
        run: |
          SERVICE="${{ github.event.inputs.service || github.event.client_payload.service || 'api' }}"
          TAG="${{ github.event.inputs.tag || github.event.client_payload.tag || 'latest' }}"
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG"        >> $GITHUB_OUTPUT
          echo "Deploy: service=$SERVICE  tag=$TAG"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SERVICE: ${{ steps.target.outputs.service }}
          TAG: ${{ steps.target.outputs.tag }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          envs: GHCR_TOKEN,GITHUB_ACTOR,SERVICE,TAG,DEPLOY_PATH
          script: |
            set -euo pipefail
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"

            DEPLOY_PATH="$(echo "$DEPLOY_PATH" | tr -d '[:space:]')"
            cd "$DEPLOY_PATH"

            # Sync infra repo to latest main
            git fetch origin main && git reset --hard origin/main || true

            # Authenticate to GHCR on the server
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            export TAG="$TAG"

            COMPOSE="docker compose --env-file $DEPLOY_PATH/.env --project-directory $DEPLOY_PATH -f $DEPLOY_PATH/docker/docker-compose.yml"

            echo "→ Deploying service: $SERVICE (tag: $TAG)"

            # NOTE: --remove-orphans is intentionally NOT used on the single-service
            # (api/web) paths below. It prunes ANY container not matching a service
            # in the current compose file project-wide, not just the one being
            # deployed — combined with `--no-deps -d <one-service>`, a stale/renamed
            # service would get its old container deleted and NEVER replaced, since
            # the command never asked to start it. That silently took the whole
            # frontend down on 2026-07-23 after a compose service rename. Orphan
            # cleanup is only safe as a full-stack operation — it stays in the
            # `all` path below, which starts every service in the same command.
            case "$SERVICE" in
              api)
                echo "→ Pulling API + migrate images..."
                $COMPOSE pull claudygod-api migrate

                echo "→ Running migrations..."
                $COMPOSE run --rm migrate || { echo "✗ Migrations failed"; exit 1; }

                echo "→ Restarting API..."
                $COMPOSE up --no-deps -d claudygod-api
                CHECK_SERVICES="claudygod-api"
                ;;

              web)
                echo "→ Pulling web image..."
                $COMPOSE pull claudygod-web

                echo "→ Restarting web..."
                $COMPOSE up --no-deps -d claudygod-web
                CHECK_SERVICES="claudygod-web"
                ;;

              all)
                echo "→ Pulling all images..."
                $COMPOSE pull claudygod-api migrate claudygod-web

                echo "→ Running migrations..."
                $COMPOSE run --rm migrate || { echo "✗ Migrations failed"; exit 1; }

                echo "→ Restarting API + web..."
                $COMPOSE up --no-deps --remove-orphans -d claudygod-api claudygod-web
                CHECK_SERVICES="claudygod-api claudygod-web"
                ;;
            esac

            # Prune images older than 24h to free disk
            docker image prune -f --filter "until=24h" >/dev/null

            echo "→ Verifying deployed services are actually running..."
            sleep 5
            for svc in $CHECK_SERVICES; do
              STATE="$($COMPOSE ps --format '{{.Service}} {{.State}}' | awk -v s="$svc" '$1==s {print $2}')"
              if [ "$STATE" != "running" ]; then
                echo "✗ Service $svc is not running (state: ${STATE:-absent}) after deploy!"
                $COMPOSE logs --tail=100 "$svc" || true
                exit 1
              fi
              echo "  ✓ $svc is running"
            done

            echo "→ Verifying public endpoints respond..."
            DOMAIN="$(grep -E '^DOMAIN=' "$DEPLOY_PATH/.env" | tail -1 | cut -d= -f2-)"
            API_DOMAIN="$(grep -E '^API_DOMAIN=' "$DEPLOY_PATH/.env" | tail -1 | cut -d= -f2-)"
            if [[ "$CHECK_SERVICES" == *claudygod-web* ]] && ! curl -sSf -o /dev/null --max-time 10 "https://${DOMAIN}/"; then
              echo "✗ https://${DOMAIN}/ did not respond after deploy!"
              $COMPOSE logs --tail=100 claudygod-web || true
              exit 1
            fi
            if [[ "$CHECK_SERVICES" == *claudygod-api* ]] && ! curl -sSf -o /dev/null --max-time 10 "https://${API_DOMAIN}/healthz"; then
              echo "✗ https://${API_DOMAIN}/healthz did not respond after deploy!"
              $COMPOSE logs --tail=100 claudygod-api || true
              exit 1
            fi

            echo "✓ Deploy complete and verified — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            $COMPOSE ps
